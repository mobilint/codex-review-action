name: Update clone badge

on:
  workflow_dispatch:
  schedule:
    # 매일 00:15 UTC에 실행
    - cron: "15 0 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch clone statistics
        env:
          TRAFFIC_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: |
          response="$(
            curl --fail --silent --show-error --location \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${TRAFFIC_TOKEN}" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/traffic/clones"
          )"

          clone_count="$(jq -r '.count' <<< "${response}")"
          unique_count="$(jq -r '.uniques' <<< "${response}")"

          mkdir -p .github/badges

          jq -n \
            --arg message "${clone_count} total / ${unique_count} unique" \
            '{
              schemaVersion: 1,
              label: "clones (14 days)",
              message: $message,
              color: "blue",
              cacheSeconds: 3600
            }' > .github/badges/clones.json

      - name: Commit updated badge data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .github/badges/clones.json

          if ! git diff --cached --quiet; then
            git commit -m "chore: update clone badge [skip ci]"
            git push
          fi
